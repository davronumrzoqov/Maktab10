services:
  - type: web
    name: maktab10
    runtime: php
    repo: https://github.com/davronumrzoqov/Maktab10.git
    branch: master
    plan: free
    region: frankfurt
    healthCheckPath: /up
    buildCommand: |-
      composer install --no-dev --optimize-autoloader --no-interaction &&
      cp .env.production .env &&
      php artisan key:generate --force &&
      php artisan storage:link --force &&
      npm install &&
      npm run build &&
      php artisan optimize &&
      php artisan migrate --force
    startCommand: |-
      php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://maktab10.onrender.com
      - key: APP_LOCALE
        value: uz
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: warning
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: true
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: maktab10-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: maktab10-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: maktab10-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: maktab10-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: maktab10-db
          property: password

databases:
  - name: maktab10-db
    plan: free
    region: frankfurt
    databaseName: maktab10
    user: maktab10_user
